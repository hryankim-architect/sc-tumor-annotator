name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install deps
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Run tests
        run: uv run pytest -q

      - name: Verify honest-scope README preamble
        run: |
          if ! grep -q "Capability portrait, not a research result" README.md; then
            echo "::error::README.md is missing the honest-scope preamble"
            exit 1
          fi

      - name: Run canary
        run: uv run python -m sctumor.canary
